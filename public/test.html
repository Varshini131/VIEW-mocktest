<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EAMCET Mock Test</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#f4f7fb;
}

/* HEADER */
.header{
  background:#2c5aa0;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
}

/* SECTIONS */
.sections{
  display:flex;
  gap:8px;
  padding:10px;
  background:#eef3f8;
}
.section-btn{
  padding:6px 14px;
  border:none;
  background:#e0e7ff;
  cursor:pointer;
}
.section-btn.active{
  background:#2563eb;
  color:white;
}

/* MAIN */
.container{
  display:flex;
  height:calc(100vh - 140px);
}

/* LEFT */
.left{
  flex:3;
  padding:20px;
  overflow:auto;
  position:relative;

  background-image:url('https://upload.wikimedia.org/wikipedia/commons/a/ae/Vignan_logo.png');
  background-repeat:no-repeat;
  background-position:center;
  background-size:250px;
}

.left::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.85);
  z-index:0;
}

.left *{
  position:relative;
  z-index:1;
}

/* OPTIONS */
.option{
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  cursor:pointer;
  background:white;
}
.option.selected{
  background:#3b82f6;
  color:white;
}

/* RIGHT */
.right{
  flex:1;
  background:#d9e6f2;
  padding:12px;
}

/* STATUS GRID */
.status-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 20px;
  margin-bottom:15px;
}
.status-grid div{
  display:flex;
  align-items:center;
  gap:10px;
}

/* HEX */
.hex{
  min-width:60px;
  text-align:center;
  padding:8px 12px;
  color:white;
  font-weight:bold;
  clip-path: polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
}

.green{background:#22c55e;}
.red{background:#ef4444;}
.gray{background:#d1d5db;color:black;}
.purple{background:#7e22ce;}
.mix{background:linear-gradient(45deg,#22c55e,#9333ea);}

/* SECTION TITLE */
.section-title{
  background:#2c5aa0;
  color:white;
  padding:5px;
  margin-top:10px;
}

/* PALETTE */
.palette{
  height:250px;
  overflow-y:auto;
}
#nav{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.qbtn{
  height:38px;
  border:1px solid #aaa;
  background:#e5e7eb;
  cursor:pointer;
}
.qbtn.answered{background:#22c55e;color:white;}
.qbtn.review{background:#9333ea;color:white;}
.qbtn.not-answered{background:#ef4444;color:white;}
.qbtn.mix{background:linear-gradient(45deg,#22c55e,#9333ea);color:white;}
.qbtn.current{border:3px solid #2563eb;}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box{
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

.popup-box button{
  display:block;
  margin:15px auto 0;   /* centers horizontally */
  padding:8px 20px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#f1f5f9;
  cursor:pointer;
}

/* BOTTOM BAR */
.bottom-bar{
  position:fixed;
  bottom:0;
  width:98%;
  background:#f1f5f9;
  border-top:1px solid #ccc;
  padding:5px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LEFT BUTTONS */
.left-actions{
  display:flex;
  gap:10px;
}

.left-actions button{
  padding:8px 14px;
  border:1px solid #ccc;
  background:#f8fafc;
  border-radius:6px;
  cursor:pointer;
}

/* RIGHT BUTTONS */
.right-actions{
  display:flex;
  gap:90px;
}

.save-next-main{
  background:#3b82f6;
  color:white;
  border:none;
  padding:10px 25px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.submit-main{
  background:#38bdf8;
  color:white;
  border:none;
  padding:10px 50px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.submit-main.disabled{
  background:#9ca3af;
  cursor:not-allowed;
}
</style>
</head>

<body onload="init()">

<div class="header">
  <b>AP EAMCET Mock Test</b>
  <span id="timer">03:00:00</span>
</div>

<div class="sections">
  <button class="section-btn active" onclick="changeSection('physics',this)">Physics</button>
  <button class="section-btn" onclick="changeSection('chemistry',this)">Chemistry</button>
  <button class="section-btn" onclick="changeSection('maths',this)">Maths</button>
</div>

<div class="container">

<div class="left">
  <div id="question"></div>
  <div id="options"></div>
</div>

<div class="right">

  <div class="status-grid">
    <div><span class="hex green" id="ans">0</span> Answered</div>
    <div><span class="hex red" id="notAnswered">0</span> Not Answered</div>
    <div><span class="hex gray" id="notVisited">0</span> Not Visited</div>
    <div><span class="hex purple" id="rev">0</span> Review</div>
    <div><span class="hex mix" id="mixCount">0</span> Ans+Review</div>
  </div>

  <div class="section-title" id="sectionTitle">Section : PHYSICS</div>

  <div class="palette">
    <div id="nav"></div>
  </div>

</div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">

  <div class="left-actions">
    <button onclick="saveMarkNext()">Marked for Review & Next</button>
    <button onclick="markReview()">Save & Mark For Review</button>
    <button onclick="clearResponse()">Clear</button>
  </div>

  <div class="right-actions">
    <button onclick="saveNext()" class="save-next-main">Save & Next</button>
    <button id="submitBtn" class="submit-main disabled" disabled>Submit</button>
  </div>

</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>✅ Test Submitted</h2>
    <button onclick="goNext()">Next</button>
  </div>
</div>

<script>

let current=0,currentSection="physics";
let examEnded=false;

let questions={
 physics:Array.from({length:40},(_,i)=>({q:`Physics Q${i+1}`,options:["A","B","C","D"]})),
 chemistry:Array.from({length:40},(_,i)=>({q:`Chemistry Q${i+1}`,options:["A","B","C","D"]})),
 maths:Array.from({length:80},(_,i)=>({q:`Maths Q${i+1}`,options:["A","B","C","D"]}))
};

let answers={physics:[],chemistry:[],maths:[]};
let review={physics:[],chemistry:[],maths:[]};
let visited={physics:[],chemistry:[],maths:[]};

/* TIMER */
let time=20;

let timer=setInterval(()=>{
 if(time<=0){
   clearInterval(timer);
   endExam();
   return;
 }

 let m=Math.floor(time/60);
 let s=time%60;

 document.getElementById("timer").innerText=
 `00:${m<10?"0":""}${m}:${s<10?"0":""}${s}`;

 time--;
},1000);

/* TIME UP */
function endExam(){
 examEnded=true;
 let btn=document.getElementById("submitBtn");
 btn.classList.remove("disabled");
 btn.disabled=false;
 document.getElementById("popup").style.display = "flex";
}

/* SUBMIT */
document.getElementById("submitBtn").onclick=function(){
 if(!examEnded){
   alert("Submit only after time up!");
   return;
 }
 document.getElementById("popup").style.display="flex";
};

function goNext(){
 alert("Go to Results Page");
}

/* INIT */
function init(){loadQuestion();}

function changeSection(sec,btn){
 currentSection=sec;current=0;
 document.querySelectorAll(".section-btn").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
 document.getElementById("sectionTitle").innerText="Section : "+sec.toUpperCase();
 loadQuestion();
}

function loadQuestion(){
 visited[currentSection][current]=true;
 let q=questions[currentSection][current];
 document.getElementById("question").innerText=(current+1)+". "+q.q;

 let opt="";
 q.options.forEach((o,i)=>{
  let sel=answers[currentSection][current]===i?"selected":"";
  opt+=`<div class="option ${sel}" onclick="select(${i})">${o}</div>`;
 });
 document.getElementById("options").innerHTML=opt;

 loadNav();updateNav();updateStats();
}

function select(i){
 answers[currentSection][current]=i;
 review[currentSection][current]=false;
 loadQuestion();
}

function clearResponse(){answers[currentSection][current]=undefined;loadQuestion();}
function markReview(){review[currentSection][current]=true;loadQuestion();}
function saveNext(){next();}
function saveMarkNext(){review[currentSection][current]=true;next();}

/* NAV */
function loadNav(){
 let nav="";
 questions[currentSection].forEach((_,i)=>{
  nav+=`<button class="qbtn" id="q${i}" onclick="go(${i})">${i+1}</button>`;
 });
 document.getElementById("nav").innerHTML=nav;
}

function updateNav(){
 questions[currentSection].forEach((_,i)=>{
  let btn=document.getElementById("q"+i);
  btn.className="qbtn";

  let a=answers[currentSection][i];
  let r=review[currentSection][i];

  if(a!==undefined && r) btn.classList.add("mix");
  else if(r) btn.classList.add("review");
  else if(a!==undefined) btn.classList.add("answered");
  else if(visited[currentSection][i]) btn.classList.add("not-answered");

  if(i===current) btn.classList.add("current");
 });
}

function updateStats(){
 let ans=0,rev=0,notAns=0,notVisited=0,mix=0;

 questions[currentSection].forEach((_,i)=>{
  let a=answers[currentSection][i];
  let r=review[currentSection][i];

  if(a!==undefined && r) mix++;
  else if(r) rev++;
  else if(a!==undefined) ans++;
  else if(visited[currentSection][i]) notAns++;
  else notVisited++;
 });

 document.getElementById("ans").innerText=ans;
 document.getElementById("rev").innerText=rev;
 document.getElementById("notAnswered").innerText=notAns;
 document.getElementById("notVisited").innerText=notVisited;
 document.getElementById("mixCount").innerText=mix;
}

function next(){
 if(current<questions[currentSection].length-1){
  current++;loadQuestion();
 }
}

function go(i){current=i;loadQuestion();}

</script>

</body>
</html>
